# Nginx configuration for FirstStep AI.
#
# Phased rollout:
#   Phase 8 brings this online alongside the api + web containers.
#   For now, the api runs on :8000 directly during dev.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 25m;

    # Buffer logs so we see request paths
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    upstream api_upstream {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # SSE-friendly chat endpoint. Buffering OFF so tokens flush immediately.
        location /api/v1/chat/ {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            add_header X-Accel-Buffering no always;
        }

        # All other API calls.
        location /api/ {
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SPA static files + fallback to index.html for client-side routing.
        location / {
            root /usr/share/nginx/html;
            try_files $uri /index.html;
        }
    }
}
