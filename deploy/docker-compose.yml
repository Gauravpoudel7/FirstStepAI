name: firststepai

# Production-oriented compose. Each phase brings in more services:
#   Phase 0: postgres + redis
#   Phase 1+: add `api`
#   Phase 8+: add `nginx` (after web image is built)
#
# Run from the repo root:
#   docker compose -f deploy/docker-compose.yml up -d
#
# For a dev loop with hot-reload:
#   docker compose -f deploy/docker-compose.yml --profile dev up

services:
  postgres:
    image: postgres:16-alpine
    container_name: firststepai-postgres
    restart: unless-stopped
    env_file:
      - env/postgres.env
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: firststepai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: firststepai-api
    restart: unless-stopped
    env_file:
      - env/api.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - vectorstore_data:/data/vectorstore
      - uploads_data:/data/uploads
      # Seed the bundled Chroma index + PDF (read-only) so lifespan startup
      # can populate the vectorstore if no index exists yet.
      - ../data/vectorstore:/seed/vectorstore:ro
      - ../data/umbrella_corp_policies.pdf:/seed/umbrella_corp_policies.pdf:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: firststepai-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  pg_data:
  redis_data:
  vectorstore_data:
  uploads_data:
