# Nginx config for FirstStep AI — React SPA + reverse-proxy /api to FastAPI.
#
# Notes:
#   * proxy_buffering off + X-Accel-Buffering: no + read_timeout 300s are
#     required so SSE chat streams reach the browser in real time.
#   * CORS is handled by FastAPI's CORSMiddleware; we don't double-handle.

upstream firststepai_api {
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Security headers (relaxed for local dev; tighten for prod).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA — fallback to index.html for client routes.
    root /usr/share/nginx/html;
    index index.html;

    # Long cache for fingerprinted assets; never cache HTML.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        try_files $uri =404;
        expires 30d;
        access_log off;
    }

    location = /index.html {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }

    # SSE / chat streaming — disable buffering, allow long-lived connections.
    location /api/v1/chat/ {
        proxy_pass http://firststepai_api;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE essentials.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding off;

        # Belt-and-braces: tell upstream not to buffer either.
        proxy_set_header X-Accel-Buffering no;
    }

    # Generic /api passthrough (auth, profile, documents, etc.)
    location /api/ {
        proxy_pass http://firststepai_api;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health probe.
    location = /healthz {
        proxy_pass http://firststepai_api/healthz;
        access_log off;
    }
}